name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Check, Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Check (format, lint, typecheck)
        run: npx vp check

      - name: Test
        run: npx vp test

      - name: Build
        run: npx vp build
